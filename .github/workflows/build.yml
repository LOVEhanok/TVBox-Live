name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleNormalDebug --build-cache --parallel --daemon

      - name: Rename APK
        run: |
          mkdir -p output
          find app/build -name "*.apk" -exec cp {} output/TVBox-Live-debug.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-Live-APK
          path: output/*.apk
          retention-days: 30
